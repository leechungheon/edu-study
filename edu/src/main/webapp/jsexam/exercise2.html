<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	h1{
		color: green;
	}
</style>
</head>
<body>
<h1>자바스크립트 실습(2)</h1>
<hr>
</body>
<script>
	const start = parseInt(Math.random()*10)+1;
	const end= parseInt(Math.random()*10)+11;
	let sum = 0;
	for(let i=start; i<=end; i++){
		sum+=i;
	}
	document.write("<h2>"+start+"부터"+end+"까지의 합은"+sum+"입니다.</h2>");
</script>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body onload="dom.innerHTML='오늘은 '+getMonth()+'월 '+getDate()+'일입니다.'">
<h1>이벤트 모델-인라인</h1><hr>
<button onclick="dom.style.color='red'">빨강색</button>
<button onclick="dom.style.color='blue'">파랑색</button>
<button onclick="dom.style.color='red'">노랑색</button><hr>
<h3></h3>
<script>
	const dom=(document.querySelector("h3"))
	function getMonth() {
		const today = new Date();
		return (today.getMonth()+1);
	}
	function getDate(){
		const today = new Date();
		return (today.getDate());
	}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	p{
		color: red;
	}
</style>
</head>
<body>
<h1 style="color: green; text-shadow: 3px 3px 5px gray;">자바스크립트로 구현하는 구구단</h1>
<hr>
<script>
	var num;
	while(true){
		num = window.prompt("숫자를 입력하세요");
		if(num>=1 && num<=9)break;
	}
	document.write("<h1>"+num+"단 입니다.</h1>");
	document.write("<hr>");
	for(let i=1; i<=9; i++){
		document.writeln(num+"x"+i+"="+(num*i)+"<br>");
	}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>날짜와 시간 컨트롤 만들기</title>
</head>
<body>
<h1>입력폼 학습(3)</h1>
<hr>
	<form method="get" action="......">
  <fieldset>
    <legend>날짜와 시간 컨트롤 만들기</legend><br>

    <!-- 날짜 선택 (달력 팝업) -->
    <label>날짜: <input type="date" name="a"/></label><br>

    <!-- 시간 선택 (시:분 스피너) -->
    <label>시간: <input type="time" name="b"/></label><br>

    <!-- 날짜 + 시간 함께 선택 -->
    <label>날짜+시간: <input type="datetime-local" name="c"/></label><br>

    <!-- 연도-월 선택 -->
    <label>월: <input type="month" name="d"/></label><br>

    <!-- 연도-주차 선택 -->
    <label>주: <input type="week" name="e"/></label><br>

  </fieldset>
  <input type="submit" value="전달해보자">
</form>

</body>

</html>

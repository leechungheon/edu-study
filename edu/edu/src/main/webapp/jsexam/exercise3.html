<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<h1 style="color: blue">자바스크립트 실습(3)</h1>
<script>
	const num = window.prompt("숫자를 입력하세요 ");
	console.log("입력된 숫자 : "+num);
	if(num==null || num==''){
		document.write("<h3>비어있는 입력</h3>");
	}else if(isNaN(num)){
		document.write("<h3>숫자가 아닌 입력</h3>");
	}else{
		let sum = 0;
		for(let i=1; i<=num; i++){
			sum+=i;
		}
		document.write("<h2>1부터 "+num+"까지의 합은"+sum+"입니다.</h2>");
	}
	
</script>
</body>
</html>
